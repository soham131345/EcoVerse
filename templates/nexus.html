<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS CORE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 255, 0.03) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        .grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 999;
        }

        .terminal {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #0f0;
            z-index: 1001;
        }

        .nexus-container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .panel {
            background: rgba(0, 20, 40, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 0;
            padding: 20px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #0ff, #f0f, #0ff);
            z-index: -1;
            animation: borderPulse 3s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .avatar-display {
            position: relative;
            width: 100%;
            height: 500px;
        }

        #avatarCanvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .stat {
            background: rgba(0, 40, 80, 0.5);
            padding: 10px;
            border-left: 3px solid #0ff;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .customize-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .customize-section::-webkit-scrollbar {
            width: 3px;
        }

        .customize-section::-webkit-scrollbar-track {
            background: rgba(0, 40, 80, 0.3);
        }

        .customize-section::-webkit-scrollbar-thumb {
            background: #0ff;
        }

        .style-option {
            background: rgba(0, 30, 60, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            position: relative;
        }

        .style-option:hover {
            background: rgba(0, 100, 200, 0.3);
            border-color: #0ff;
            transform: translateY(-2px);
        }

        .style-option.selected {
            background: rgba(0, 255, 255, 0.1);
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .style-option.locked {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .style-option.locked::after {
            content: 'LOCKED';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: #f00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .style-name {
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .style-cost {
            font-size: 10px;
            color: #ff0;
        }

        .style-level {
            font-size: 9px;
            color: #f0f;
        }

        .execute-btn {
            background: linear-gradient(45deg, #000, #0ff);
            border: none;
            color: #000;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
        }

        .execute-btn:hover {
            background: linear-gradient(45deg, #0ff, #000);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            transform: scale(1.02);
        }

        .execute-btn:active {
            transform: scale(0.98);
        }

        .xp-bar {
            height: 4px;
            background: rgba(0, 255, 255, 0.1);
            margin-top: 5px;
            overflow: hidden;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ff, #f0f);
            transition: width 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 998;
        }

        .aura-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
        }

        .nav a {
            color: #0ff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #0ff;
            transition: width 0.3s;
        }

        .nav a:hover::after {
            width: 100%;
        }

        .logo {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #0ff;
            z-index: 1001;
        }

        .logo span {
            color: #f0f;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid"></div>
    <div class="particles" id="particles"></div>
    
    <div class="logo">ECOVERSE<span>::</span>NEXUS</div>
    
    <div class="nav">
        <a href="/logout">DISCONNECT</a>
        <a href="#" onclick="exportAvatar()">EXPORT</a>
        <a href="#" onclick="toggleSound()">SOUND</a>
    </div>
    
    <div class="terminal" id="terminal"></div>
    
    <div class="nexus-container">
        <div class="panel">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">TOKENS</div>
                    <div class="stat-value" id="tokenDisplay">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">LEVEL</div>
                    <div class="stat-value" id="levelDisplay">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">SYNC</div>
                    <div class="stat-value" id="syncDisplay">100%</div>
                </div>
                <div class="stat">
                    <div class="stat-label">FPS</div>
                    <div class="stat-value" id="fpsDisplay">60</div>
                </div>
            </div>
            
            <div style="margin-top: 20px;">
                <div class="stat-label">CORE INTEGRITY</div>
                <div class="xp-bar">
                    <div class="xp-fill" id="xpBar"></div>
                </div>
                <div style="font-size: 10px; margin-top: 5px;">
                    <span id="xpText">0/100</span>
                </div>
            </div>
            
            <div style="margin-top: 30px;">
                <div class="stat-label">UNLOCKED PATTERNS</div>
                <div id="unlockedList" style="font-size: 10px; margin-top: 10px; line-height: 1.4;"></div>
            </div>
        </div>
        
        <div class="panel">
            <div class="avatar-display">
                <canvas id="avatarCanvas"></canvas>
                <div class="aura-display" id="auraCanvas"></div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="execute-btn" onclick="saveConfiguration()">
                    EXECUTE CONFIGURATION
                </button>
                <div style="font-size: 11px; margin-top: 10px; color: rgba(0, 255, 255, 0.7);">
                    COST: <span id="totalCost">0</span> TOKENS
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div style="margin-bottom: 20px;">
                <div class="stat-label">CUSTOMIZATION MATRIX</div>
            </div>
            
            <div class="customize-section" id="skinOptions"></div>
            <div class="customize-section" id="hairOptions"></div>
            <div class="customize-section" id="outfitOptions"></div>
            <div class="customize-section" id="auraOptions"></div>
            <div class="customize-section" id="accessoryOptions"></div>
        </div>
    </div>

    <script>
        let config = {
            skin: 'void',
            hair: 'flow',
            outfit: 'nexus',
            aura: 'pulse',
            accessories: [],
            tokens: 0,
            level: 1,
            xp: 0,
            unlocked: []
        };
        
        let selected = {
            skin: {value: 'void', cost: 0},
            hair: {value: 'flow', cost: 0},
            outfit: {value: 'nexus', cost: 0},
            aura: {value: 'pulse', cost: 0},
            accessory: {value: 'none', cost: 0}
        };
        
        const styles = {
            skin: [
                {id: 'void', name: 'VOID', cost: 0, level: 1},
                {id: 'quantum', name: 'QUANTUM', cost: 500, level: 10},
                {id: 'nebula', name: 'NEBULA', cost: 800, level: 20},
                {id: 'obsidian', name: 'OBSIDIAN', cost: 1200, level: 30},
                {id: 'singularity', name: 'SINGULARITY', cost: 2000, level: 50}
            ],
            hair: [
                {id: 'flow', name: 'FLOW', cost: 0, level: 1},
                {id: 'neural', name: 'NEURAL', cost: 300, level: 5},
                {id: 'static', name: 'STATIC', cost: 600, level: 15},
                {id: 'phase', name: 'PHASE', cost: 900, level: 25},
                {id: 'voidstrand', name: 'VOID STRAND', cost: 1500, level: 40}
            ],
            outfit: [
                {id: 'nexus', name: 'NEXUS', cost: 0, level: 1},
                {id: 'matrix', name: 'MATRIX', cost: 400, level: 8},
                {id: 'grid', name: 'GRID', cost: 700, level: 18},
                {id: 'core', name: 'CORE', cost: 1100, level: 28},
                {id: 'infinity', name: 'INFINITY', cost: 1800, level: 45}
            ],
            aura: [
                {id: 'pulse', name: 'PULSE', cost: 0, level: 1},
                {id: 'wave', name: 'WAVE', cost: 600, level: 12},
                {id: 'field', name: 'FIELD', cost: 1000, level: 22},
                {id: 'vortex', name: 'VORTEX', cost: 1400, level: 35},
                {id: 'singularity', name: 'SINGULARITY', cost: 2500, level: 60}
            ],
            accessories: [
                {id: 'none', name: 'NONE', cost: 0, level: 1},
                {id: 'node', name: 'NODE', cost: 200, level: 3},
                {id: 'circuit', name: 'CIRCUIT', cost: 450, level: 10},
                {id: 'orbital', name: 'ORBITAL', cost: 800, level: 20},
                {id: 'nexuscore', name: 'NEXUS CORE', cost: 1600, level: 38}
            ]
        };
        
        let canvas, ctx, auraCtx;
        let particles = [];
        let lastTime = 0;
        let frameCount = 0;
        let fps = 60;
        let terminalLines = [];
        let soundEnabled = true;
        
        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.size = Math.random() * 3 + 1;
                this.type = type;
                this.color = type === 'energy' ? '#0ff' : '#f0f';
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function init() {
            canvas = document.getElementById('avatarCanvas');
            ctx = canvas.getContext('2d');
            
            const auraCanvas = document.createElement('canvas');
            auraCanvas.width = canvas.width = 800;
            auraCanvas.height = canvas.height = 600;
            document.getElementById('auraCanvas').appendChild(auraCanvas);
            auraCtx = auraCanvas.getContext('2d');
            
            loadAvatarData();
            createParticles();
            setupOptions();
            animate();
            updateTerminal();
            setInterval(updateFPS, 1000);
        }
        
        function loadAvatarData() {
            fetch('/avatar/data')
                .then(r => r.json())
                .then(data => {
                    config = {...config, ...data};
                    selected.skin.value = config.skin;
                    selected.hair.value = config.hair;
                    selected.outfit.value = config.outfit;
                    selected.aura.value = config.aura;
                    selected.accessory.value = config.accessories[0] || 'none';
                    updateDisplay();
                    updateOptions();
                });
        }
        
        function createParticles() {
            particles = [];
            for(let i = 0; i < 200; i++) {
                particles.push(new Particle(
                    Math.random() * window.innerWidth,
                    Math.random() * window.innerHeight,
                    Math.random() > 0.5 ? 'energy' : 'data'
                ));
            }
        }
        
        function setupOptions() {
            for(const category in styles) {
                const container = document.getElementById(category + 'Options');
                if(!container) continue;
                
                styles[category].forEach(style => {
                    const div = document.createElement('div');
                    div.className = 'style-option';
                    div.dataset.value = style.id;
                    div.dataset.cost = style.cost;
                    div.dataset.level = style.level;
                    
                    div.innerHTML = `
                        <div class="style-name">${style.name}</div>
                        <div class="style-cost">${style.cost} TOKENS</div>
                        <div class="style-level">LEVEL ${style.level}</div>
                    `;
                    
                    div.onclick = () => selectStyle(category, style.id, style.cost, style.level);
                    container.appendChild(div);
                });
            }
        }
        
        function selectStyle(category, value, cost, requiredLevel) {
            if(requiredLevel > config.level) return;
            
            selected[category] = {value, cost};
            config[category] = value;
            if(category === 'accessory') config.accessories = [value];
            
            updateOptions();
            calculateTotal();
        }
        
        function updateOptions() {
            for(const category in styles) {
                styles[category].forEach(style => {
                    const el = document.querySelector(`[data-value="${style.id}"]`);
                    if(el) {
                        el.classList.toggle('selected', selected[category].value === style.id);
                        el.classList.toggle('locked', style.level > config.level);
                    }
                });
            }
        }
        
        function calculateTotal() {
            let total = 0;
            for(const key in selected) {
                total += selected[key].cost;
            }
            document.getElementById('totalCost').textContent = total;
            return total;
        }
        
        function updateDisplay() {
            document.getElementById('tokenDisplay').textContent = Math.floor(config.tokens);
            document.getElementById('levelDisplay').textContent = config.level;
            document.getElementById('xpText').textContent = `${config.xp}/${config.level * 100}`;
            document.getElementById('xpBar').style.width = `${(config.xp / (config.level * 100)) * 100}%`;
            
            const unlockedList = document.getElementById('unlockedList');
            unlockedList.innerHTML = config.unlocked.map(u => `<div>${u.toUpperCase()}</div>`).join('');
        }
        
        function drawAvatar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const time = Date.now() * 0.001;
            
            drawBody(centerX, centerY, time);
            drawHair(centerX, centerY, time);
            drawOutfit(centerX, centerY, time);
            drawAccessory(centerX, centerY, time);
        }
        
        function drawBody(x, y, time) {
            const colors = {
                void: ['#000', '#111'],
                quantum: ['#00ffff', '#0088ff'],
                nebula: ['#ff00ff', '#8800ff'],
                obsidian: ['#222222', '#444444'],
                singularity: ['#ffffff', '#000000']
            };
            
            const colorSet = colors[config.skin] || colors.void;
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, 100);
            gradient.addColorStop(0, colorSet[0]);
            gradient.addColorStop(1, colorSet[1]);
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, 80, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, 85 + Math.sin(time * 2) * 5, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        function drawHair(x, y, time) {
            const hairY = y - 60;
            
            if(config.hair === 'neural') {
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                for(let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2 + time;
                    const length = 40 + Math.sin(time * 3 + i) * 20;
                    const endX = x + Math.cos(angle) * length;
                    const endY = hairY + Math.sin(angle) * length;
                    
                    ctx.moveTo(x, hairY);
                    ctx.lineTo(endX, endY);
                    
                    if(Math.random() > 0.7) {
                        particles.push(new Particle(endX, endY, 'energy'));
                    }
                }
                ctx.stroke();
            } else if(config.hair === 'static') {
                ctx.strokeStyle = '#f0f';
                ctx.lineWidth = 2;
                for(let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    ctx.beginPath();
                    for(let j = 0; j < 5; j++) {
                        const segmentX = x + Math.cos(angle) * (20 + j * 15);
                        const segmentY = hairY + Math.sin(angle) * (20 + j * 15) + Math.sin(time * 4 + i + j) * 10;
                        
                        if(j === 0) {
                            ctx.moveTo(segmentX, segmentY);
                        } else {
                            ctx.lineTo(segmentX, segmentY);
                        }
                    }
                    ctx.stroke();
                }
            } else if(config.hair === 'phase') {
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#0ff';
                ctx.beginPath();
                for(let i = 0; i < 24; i++) {
                    const angle = (i / 24) * Math.PI * 2;
                    const radius = 35 + Math.sin(time * 2 + i * 0.5) * 15;
                    const px = x + Math.cos(angle) * radius;
                    const py = hairY + Math.sin(angle) * radius;
                    
                    if(i === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.closePath();
                ctx.fill();
                ctx.globalAlpha = 1;
            } else if(config.hair === 'voidstrand') {
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 4;
                ctx.beginPath();
                for(let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + time * 0.5;
                    const length = 50 + Math.sin(time * 2 + i) * 30;
                    const endX = x + Math.cos(angle) * length;
                    const endY = hairY + Math.sin(angle) * length;
                    
                    ctx.moveTo(x, hairY);
                    ctx.lineTo(endX, endY);
                    
                    ctx.beginPath();
                    ctx.arc(endX, endY, 8, 0, Math.PI * 2);
                    ctx.fillStyle = '#000';
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.stroke();
            }
        }
        
        function drawOutfit(x, y, time) {
            const outfitY = y + 40;
            
            if(config.outfit === 'matrix') {
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 2;
                
                for(let i = 0; i < 8; i++) {
                    const xPos = x - 60 + i * 15;
                    ctx.beginPath();
                    ctx.moveTo(xPos, outfitY);
                    ctx.lineTo(xPos, outfitY + 80);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(x - 60, outfitY + i * 10);
                    ctx.lineTo(x + 60, outfitY + i * 10);
                    ctx.stroke();
                }
            } else if(config.outfit === 'grid') {
                ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
                ctx.fillRect(x - 50, outfitY, 100, 80);
                
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 1;
                for(let i = 0; i < 6; i++) {
                    ctx.beginPath();
                    ctx.moveTo(x - 50 + i * 20, outfitY);
                    ctx.lineTo(x - 50 + i * 20, outfitY + 80);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(x - 50, outfitY + i * 16);
                    ctx.lineTo(x + 50, outfitY + i * 16);
                    ctx.stroke();
                }
            } else if(config.outfit === 'core') {
                const gradient = ctx.createLinearGradient(x, outfitY, x, outfitY + 80);
                gradient.addColorStop(0, '#ff00ff');
                gradient.addColorStop(1, '#00ffff');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x - 40, outfitY, 80, 80);
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.strokeRect(x - 40, outfitY, 80, 80);
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(x, outfitY + 40, 20, 0, Math.PI * 2);
                ctx.fill();
            } else if(config.outfit === 'infinity') {
                ctx.save();
                ctx.translate(x, outfitY + 40);
                ctx.rotate(time);
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                for(let i = 0; i < 3; i++) {
                    ctx.rotate(Math.PI / 3);
                    drawInfinitySymbol();
                }
                
                ctx.restore();
            }
        }
        
        function drawInfinitySymbol() {
            ctx.beginPath();
            ctx.moveTo(-30, 0);
            ctx.bezierCurveTo(-30, -20, 30, -20, 30, 0);
            ctx.bezierCurveTo(30, 20, -30, 20, -30, 0);
            ctx.stroke();
        }
        
        function drawAccessory(x, y, time) {
            if(config.accessories[0] === 'node') {
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(x, y - 100, 10, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#ff0';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(x, y - 100, 15 + Math.sin(time * 3) * 5, 0, Math.PI * 2);
                ctx.stroke();
            } else if(config.accessories[0] === 'circuit') {
                const points = [
                    [x - 60, y - 120],
                    [x - 30, y - 120],
                    [x, y - 100],
                    [x + 30, y - 120],
                    [x + 60, y - 120]
                ];
                
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                points.forEach((point, i) => {
                    if(i === 0) {
                        ctx.moveTo(point[0], point[1]);
                    } else {
                        ctx.lineTo(point[0], point[1]);
                    }
                });
                ctx.stroke();
                
                points.forEach(point => {
                    ctx.fillStyle = '#f0f';
                    ctx.beginPath();
                    ctx.arc(point[0], point[1], 5, 0, Math.PI * 2);
                    ctx.fill();
                });
            } else if(config.accessories[0] === 'orbital') {
                ctx.save();
                ctx.translate(x, y - 80);
                ctx.rotate(time);
                
                ctx.strokeStyle = '#f0f';
                ctx.lineWidth = 1;
                for(let i = 0; i < 3; i++) {
                    ctx.rotate(Math.PI * 2 / 3);
                    ctx.beginPath();
                    ctx.arc(0, 40, 20, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#0ff';
                    ctx.beginPath();
                    ctx.arc(0, 40, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        function drawAura() {
            auraCtx.clearRect(0, 0, auraCtx.canvas.width, auraCtx.canvas.height);
            
            const centerX = auraCtx.canvas.width / 2;
            const centerY = auraCtx.canvas.height / 2;
            const time = Date.now() * 0.001;
            
            if(config.aura === 'wave') {
                auraCtx.strokeStyle = '#0ff';
                auraCtx.lineWidth = 2;
                auraCtx.globalAlpha = 0.3;
                
                for(let i = 0; i < 5; i++) {
                    const radius = 120 + i * 20 + Math.sin(time * 2 + i) * 10;
                    auraCtx.beginPath();
                    auraCtx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    auraCtx.stroke();
                }
                auraCtx.globalAlpha = 1;
            } else if(config.aura === 'field') {
                const gradient = auraCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 200);
                gradient.addColorStop(0, 'rgba(0, 255, 255, 0.3)');
                gradient.addColorStop(1, 'transparent');
                
                auraCtx.fillStyle = gradient;
                auraCtx.beginPath();
                auraCtx.arc(centerX, centerY, 200 + Math.sin(time) * 20, 0, Math.PI * 2);
                auraCtx.fill();
            } else if(config.aura === 'vortex') {
                auraCtx.save();
                auraCtx.translate(centerX, centerY);
                auraCtx.rotate(time);
                
                auraCtx.strokeStyle = '#f0f';
                auraCtx.lineWidth = 1;
                auraCtx.globalAlpha = 0.5;
                
                for(let i = 0; i < 12; i++) {
                    auraCtx.rotate(Math.PI / 6);
                    auraCtx.beginPath();
                    for(let j = 0; j < 100; j++) {
                        const angle = j * 0.1;
                        const radius = 50 + j * 2;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius / 2;
                        
                        if(j === 0) {
                            auraCtx.moveTo(x, y);
                        } else {
                            auraCtx.lineTo(x, y);
                        }
                    }
                    auraCtx.stroke();
                }
                
                auraCtx.restore();
                auraCtx.globalAlpha = 1;
            } else if(config.aura === 'singularity') {
                const gradient = auraCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 300);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.2, 'rgba(0, 255, 255, 0.6)');
                gradient.addColorStop(0.4, 'rgba(255, 0, 255, 0.4)');
                gradient.addColorStop(1, 'transparent');
                
                auraCtx.fillStyle = gradient;
                auraCtx.beginPath();
                auraCtx.arc(centerX, centerY, 300, 0, Math.PI * 2);
                auraCtx.fill();
                
                auraCtx.strokeStyle = '#fff';
                auraCtx.lineWidth = 3;
                auraCtx.beginPath();
                auraCtx.arc(centerX, centerY, 150 + Math.sin(time * 3) * 20, 0, Math.PI * 2);
                auraCtx.stroke();
            }
        }
        
        function drawParticles() {
            const ctx = document.getElementById('particles').getContext('2d');
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            
            particles = particles.filter(p => p.update());
            particles.forEach(p => p.draw(ctx));
            
            if(Math.random() > 0.7) {
                particles.push(new Particle(
                    Math.random() * ctx.canvas.width,
                    Math.random() * ctx.canvas.height,
                    Math.random() > 0.5 ? 'energy' : 'data'
                ));
            }
            
            if(particles.length < 150) {
                particles.push(new Particle(
                    Math.random() * ctx.canvas.width,
                    Math.random() * ctx.canvas.height,
                    'energy'
                ));
            }
        }
        
        function animate(currentTime) {
            frameCount++;
            
            const deltaTime = currentTime - lastTime;
            if(deltaTime > 0) {
                fps = 1000 / deltaTime;
            }
            lastTime = currentTime;
            
            drawAvatar();
            drawAura();
            drawParticles();
            
            requestAnimationFrame(animate);
        }
        
        function updateFPS() {
            document.getElementById('fpsDisplay').textContent = Math.min(999, Math.floor(fps));
            document.getElementById('syncDisplay').textContent = `${Math.floor(Math.random() * 10 + 95)}%`;
        }
        
        function updateTerminal() {
            const messages = [
                'SYSTEM BOOT',
                'NEXUS CORE ONLINE',
                'LOADING AVATAR MATRIX',
                'INITIALIZING PARTICLE SYSTEM',
                'SYNCING WITH DATABASE',
                'READY FOR CONFIGURATION'
            ];
            
            const terminal = document.getElementById('terminal');
            
            if(terminalLines.length < messages.length) {
                terminalLines.push(messages[terminalLines.length]);
            } else if(Math.random() > 0.95) {
                terminalLines.push(`SYSTEM_PULSE_${Date.now().toString(16).toUpperCase()}`);
            }
            
            if(terminalLines.length > 10) {
                terminalLines.shift();
            }
            
            terminal.innerHTML = terminalLines.map(line => 
                `<div>> ${line}</div>`
            ).join('');
            
            setTimeout(updateTerminal, 1000 + Math.random() * 2000);
        }
        
        function saveConfiguration() {
            const totalCost = calculateTotal();
            
            if(totalCost > config.tokens) {
                addTerminalMessage('ERROR: INSUFFICIENT TOKENS');
                return;
            }
            
            const data = {
                skin: selected.skin.value,
                hair: selected.hair.value,
                outfit: selected.outfit.value,
                aura: selected.aura.value,
                accessories: [selected.accessory.value],
                cost: totalCost
            };
            
            fetch('/avatar/core', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(response => {
                if(response.success) {
                    config.tokens = response.tokens;
                    config.level = response.level;
                    config.xp = response.xp;
                    config.unlocked = response.unlocked;
                    
                    updateDisplay();
                    updateOptions();
                    addTerminalMessage('CONFIGURATION EXECUTED');
                    
                    if(response.level_up) {
                        addTerminalMessage('LEVEL INCREASED');
                        triggerLevelUpEffect();
                    }
                } else {
                    addTerminalMessage('ERROR: ' + response.error);
                }
            })
            .catch(() => {
                addTerminalMessage('NETWORK ERROR');
            });
        }
        
        function addTerminalMessage(msg) {
            terminalLines.push(msg);
            if(terminalLines.length > 10) terminalLines.shift();
        }
        
        function triggerLevelUpEffect() {
            for(let i = 0; i < 100; i++) {
                setTimeout(() => {
                    particles.push(new Particle(
                        canvas.width / 2 + (Math.random() - 0.5) * 100,
                        canvas.height / 2 + (Math.random() - 0.5) * 100,
                        'energy'
                    ));
                }, i * 10);
            }
        }
        
        function exportAvatar() {
            const link = document.createElement('a');
            link.download = `avatar_${config.level}_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            addTerminalMessage('AVATAR EXPORTED');
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            addTerminalMessage(`SOUND ${soundEnabled ? 'ENABLED' : 'DISABLED'}`);
        }
        
        window.addEventListener('load', init);
        window.addEventListener('resize', () => {
            createParticles();
        });
    </script>
</body>
</html>
